name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    # Only the canonical repo publishes docs; the sage-home mirror has no
    # GitHub Pages configured, so skip it there.
    if: github.repository == 'MBradley1985/ViSAGE'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install docs deps
        run: pip install -e ".[dev]"
      - name: Build docs
        run: mkdocs build --config-file docs/mkdocs.yml
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    needs: build
    if: github.repository == 'MBradley1985/ViSAGE'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
