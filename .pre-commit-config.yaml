repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        # mkdocs.yml uses mkdocs-material's !!python/name: tags, which
        # check-yaml cannot parse.
        exclude: ^docs/mkdocs\.yml$
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        args: [--fix]
      # ruff-format removed: it fights black over implicit string concatenation
      # (each reformats the other's output, so hooks never pass). Black is the
      # project formatter per CONTRIBUTING.md; ruff is lint-only.

  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
