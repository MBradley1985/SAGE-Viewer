repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        # mkdocs.yml uses mkdocs-material's !!python/name: tags; --unsafe
        # syntax-checks without constructing them.
        args: ['--unsafe']
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.0
    hooks:
      - id: ruff
        args: [--fix]
      # ruff-format removed: it fights black over implicit string concatenation
      # (each reformats the other's output, so hooks never pass). Black is the
      # project formatter per CONTRIBUTING.md; ruff is lint-only.

  - repo: https://github.com/psf/black
    rev: 24.3.0
    hooks:
      - id: black
