site_name: SAGE-Viewer
site_url: https://mbradley1985.github.io/SAGE-Viewer/
site_description: Interactive 3D visualization for SAGE semi-analytic galaxy formation outputs
site_author: Michael Bradley

repo_name: MBradley1985/SAGE-Viewer
repo_url: https://github.com/MBradley1985/SAGE-Viewer
edit_uri: edit/main/docs/

docs_dir: .
site_dir: ../site

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.highlight
  icon:
    repo: fontawesome/brands/github
  custom_dir: .
  font:
    text: Inter
    code: JetBrains Mono
  favicon: images/SAGElogo.jpg
  logo: images/SAGElogo.jpg

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - macros:
      include_dir: ..
  - mkdocstrings:
      handlers:
        python:
          paths: [".."]
          options:
            show_source: true
            show_root_heading: true
            heading_level: 2
            docstring_style: numpy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting_started/installation.md
      - Quickstart: getting_started/quickstart.md
      - Configuration: getting_started/configuration.md
  - User Guide:
      - Interface: user_guide/interface.md
      - Navigation: user_guide/navigation.md
      - Multi-Box Comparison: user_guide/multi_box.md
      - Launch Mode: user_guide/launch_mode.md
      - Recording: user_guide/recording.md
      - Library: user_guide/library.md
      - Console: user_guide/console.md
      - Data Sources: user_guide/data_sources.md
      - Colormaps: user_guide/colormaps.md
  - Physics Reference:
      - Dark Matter Haloes: physics/haloes.md
      - Galaxies: physics/galaxies.md
  - API Reference: api/index.md
  - Project:
      - Changelog: project/changelog.md
      - Contributing: project/contributing.md
      - Story Mode (Design): project/story_mode_design.md
